<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"back"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1b2f45 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* castle card – main home */
        .disney-homepage {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px #f5e9d8 inset, 0 0 0 5px #2f4b70 inset;
            padding: 30px 25px 40px 25px;
            border: 1px solid #ffdfb0;
        }

        /* header like disney+ or magic kingdom */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fee8b0, #ffd966, #b68b40);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #ffb347, 0 2px 0 #7a3e1f;
            font-family: 'Trebuchet MS', 'Mickey', sans-serif;
            margin-bottom: 8px;
        }

        .header p {
            color: #f0e3d0;
            font-size: 1.3rem;
            font-style: italic;
            text-shadow: 2px 2px 0 #1f3a5f;
            background: rgba(0, 10, 25, 0.5);
            display: inline-block;
            padding: 5px 30px;
            border-radius: 60px;
            letter-spacing: 1px;
            border: 1px solid #ffbe7e;
        }

        .title-disclaimer {
            margin-top: 8px;
            color: #d6c9ad;
            font-size: 0.72rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .login-btn-wrap {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }

        .homepage-btn {
            background: linear-gradient(145deg, #2d4f78, #1d3654);
            color: #fff2cc;
            border: 1px solid #f6c07a;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 0 #13263a;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .homepage-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #13263a;
        }

        /* gallery – exactly 3 pictures, each 150px */
        .picture-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 25px;
            margin: 40px 0 25px 0;
        }

        /* picture card – disney themed frame */
        .picture-card {
            width: 150px;
            background: #fae6cd;
            border-radius: 35px 35px 25px 25px;
            padding: 10px 10px 15px 10px;
            box-shadow: 0 15px 0 #6b3f1f, 0 20px 15px rgba(0, 0, 0, 0.4);
            border: 2px solid #ffcf9a;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* make sure image fits exactly 150px (square) */
        .picture-card img {
            width: 150px;
            height: 150px;
            display: block;
            object-fit: cover;          /* keeps proportions, fills square */
            border-radius: 25px 25px 18px 18px;
            background: #c1aed6;        /* fallback for loading */
            border: 2px solid #faf0d7;
            box-shadow: inset 0 0 0 2px #b5835a;
        }

        /* classic disney name under each picture */
        .picture-caption {
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            background: #2b4970;
            color: #ffecbb;
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid #fbc17b;
            box-shadow: 0 3px 0 #123049;
            letter-spacing: 0.5px;
            text-align: center;
            width: fit-content;
        }

        /* 3 cards get individual mouse glow (extra disney) */
        .picture-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 0 #522f12, 0 25px 25px rgba(0, 0, 0, 0.5), 0 0 0 3px #ffdb9f;
        }

        .picture-card:hover .picture-caption {
            background: #3f6290;
            color: #fff2c2;
        }

        /* footer – enchanted */
        .footer {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            font-size: 1.4rem;
            color: #ffeec2;
            text-shadow: 2px 2px 0 #2f1e0e;
            background: #233e5e;
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #b58a5b;
            box-shadow: inset 0 -3px 0 #0e1e2f;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .footer span {
            margin: 0 8px;
            filter: drop-shadow(0 4px 2px #00000066);
        }

        /* stars / mickey dots */
        .stars {
            font-size: 2rem;
            line-height: 1;
            user-select: none;
        }

        /* responsive: keep three in a row until very small */
        @media (max-width: 600px) {
            .picture-gallery {
                gap: 15px;
            }
            .disney-homepage {
                padding: 20px 12px;
            }
            .header h1 {
                font-size: 2.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="disney-homepage">
        <!-- header with disney castle vibes -->
        <div class="header">
            <h1>✨🏰 WELCOME TO DISNEYLAND 🏰✨</h1>
            <div class="title-disclaimer">✨ENJOY THE FANTASY BABY✨</div>
            <p>HOMEPAGE WITH FANTASY BABY</p>
            <div class="homepage-btn-wrap">
                <button type="button" class="homepage-btn" onclick="window.location.href='login.html';">BACK</button>
                <button type="button" class="homepage-btn" onclick="window.location.href='about.html';">ABOUT</button>
            </div>
        </div>

        <!-- three (3) pictures gallery - exactly 150px each -->
        <div class="picture-gallery">
            <!-- picture 1:Mickey Mouse -->
            <div class="picture-card">
                <!-- 
                    Mickey Mouse silhouette / public domain style image 
                    base64 minimal disney character – mickey face (silhouette+ears)
                    (clean transparent background, recognizable disney)
                -->
                <img src="mickey.jpg"
                     alt="Mickey Mouse - Disney icon">
                <div class="picture-caption">🐭 MICKEY</div>
            </div>

            <!-- picture 2: Minnie Mouse (with bow) -->
            <div class="picture-card">
                <img src="minnie.jpg"
                     alt="Minnie Mouse with signature bow">
                <div class="picture-caption">🎀 MINNIE</div>
            </div>

            <!-- picture 3: Donald Duck (classic sailor) -->
            <div class="picture-card">
                <img src="donald.jpg"
                     alt="Donald Duck - Disney classic">
                <div class="picture-caption">⛵ DONALD</div>
            </div>
        </div>

        <!-- enchanted footer with hidden mickey -->
        <div class="footer">
            <span class="stars">✨</span>  part of your world  <span class="stars">✨</span>
        </div>

        <!-- tiny disclaimer (just for charm) -->
        <div style="text-align: center; margin-top: 15px; color: #bfb39b; font-size: 0.8rem; opacity: 0.7;">
            🪄 disney magic
        </div>
    </div>
</body>
</html>
