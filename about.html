<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney · about the gang (4 pictures)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #1f3b5c, #0b1b2f);
            font-family: 'Segoe UI', 'Mickey', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        /* enchanted storybook card */
        .about-page {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 245, 225, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 70px 70px 50px 50px;
            padding: 40px 30px 50px 30px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), 0 0 0 4px #fad59f inset, 0 0 0 8px #4b2f1a inset;
            border: 2px solid #ffcf8a;
        }

        /* header with castle / disneyland vibe */
        .about-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .about-header h1 {
            font-size: 3.4rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(145deg, #fce38d, #ffb347, #f6a7c1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 5px 0 #613d1e, 0 8px 12px #00000070;
            font-family: 'Trebuchet MS', 'Copperplate', fantasy;
            margin-bottom: 6px;
        }

        .about-header p {
            font-size: 1.5rem;
            background: #1e3b4f;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 50px;
            color: #faeacb;
            border: 2px solid #ffbc7a;
            box-shadow: 0 5px 0 #092634;
            font-style: italic;
        }

        .about-actions {
            margin-top: 14px;
            display: flex;
            justify-content: center;
        }

        .about-btn {
            background: linear-gradient(145deg, #2d4f78, #1d3654);
            color: #fff2cc;
            border: 1px solid #f6c07a;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 0 #13263a;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .about-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #13263a;
        }

        /* 4 picture grid — each picture exactly 200px */
        .character-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px 25px;
            margin: 30px 0 30px;
        }

        /* character card — holds image + info text below */
        .character-card {
            width: 200px;                /* fixed width to match image */
            background: #fffbf0;
            border-radius: 40px 40px 35px 35px;
            padding: 15px 12px 20px 12px;
            box-shadow: 0 15px 0 #6b3f1f, 0 22px 20px #00000055;
            border: 2px solid #fdd49c;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* image itself — exactly 200px */
        .character-card img {
            width: 200px;
            height: 200px;
            display: block;
            object-fit: cover;            /* keeps character proportions */
            border-radius: 35px 35px 25px 25px;
            background: #b6c9e8;          /* soft fallback */
            border: 3px solid #fef9d7;
            box-shadow: 0 0 0 2px #b5835a, inset 0 0 0 3px #fff5d0;
        }

        /* info text below picture — disney styled */
        .info-text {
            margin-top: 18px;
            width: 100%;
            background: #1f4172;           /* deep magic kingdom blue */
            padding: 12px 8px 10px 8px;
            border-radius: 30px 30px 20px 20px;
            color: #ffefc0;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.4;
            border: 2px solid #ffbb77;
            box-shadow: inset 0 -3px 0 #0a2647, 0 6px 0 #2f1c0b;
            letter-spacing: 0.4px;
            word-break: break-word;
        }

        /* each info text gets a little icon via pseudo (optional) */
        .info-text::before {
            content: "✨";
            font-size: 1.1rem;
            margin-right: 4px;
            filter: drop-shadow(0 0 4px gold);
        }

        .info-text::after {
            content: "✨";
            font-size: 1.1rem;
            margin-left: 4px;
            filter: drop-shadow(0 0 4px gold);
        }

        /* hover effect: magical pop */
        .character-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 0 #5a351a, 0 28px 30px #00000080, 0 0 0 4px #ffe5b4;
        }

        .character-card:hover .info-text {
            background: #285a9c;
            color: #ffffe0;
        }

        /* footer / about note */
        .about-footer {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            font-size: 1.6rem;
            background: #233e5e;
            padding: 12px 25px;
            border-radius: 60px;
            color: #ffeec2;
            border: 2px solid #f7b26a;
            box-shadow: inset 0 -3px 0 #102433;
            font-weight: 500;
        }

        .about-footer span {
            margin: 0 15px;
            filter: drop-shadow(0 4px 2px black);
        }

        /* tiny caption */
        .copyright {
            text-align: center;
            margin-top: 20px;
            color: #d4c2a2;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* responsive: if screen too small, cards stack but stay 200px */
        @media (max-width: 560px) {
            .about-page {
                padding: 30px 15px;
            }
            .about-header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="about-page">
        <!-- disney about header -->
        <div class="about-header">
            <h1>🏰 MEET THE LEGENDS 🏰</h1>
            <p> four characters · pleasing and wonderful personality</p>
            <div class="about-actions">
                <button type="button" class="about-btn" onclick="window.location.href='homepage.html';">HOMEPAGE</button>
            </div>
        </div>

        <!-- 4 picture grid with info text below each -->
        <div class="character-grid">
            <!-- 1) MICKEY MOUSE - info about the leader -->
            <div class="character-card">
                <img src="hanna.jpg"
                     alt="Mickey Mouse">
                <div class="info-text">Hanna · cheerful personality</div>
            </div>

            <!-- 2) MINNIE MOUSE - with bow & charm -->
            <div class="character-card">
                <img src="tony.jpg"
                     alt="Minnie Mouse">
                <div class="info-text">Thony · fashionista & sweetheart</div>
            </div>

            <!-- 3) DONALD DUCK - sailor with temper -->
            <div class="character-card">
                <img src="eunice.jpg"
                     alt="Donald Duck">
                <div class="info-text">Eunice · short fuse, big heart</div>
            </div>

            <!-- 4) GOOFY - tall & lovable -->
            <div class="character-card">
                <img src="rhian.png"
                     alt="Goofy">
                <div class="info-text">Rhian · gawrsh! forever cute & loyal</div>
            </div>
        </div>

        <!-- extra information text (overall about page vibe) -->
        <div class="about-footer">
            <span>🐾</span>  disney through the years  <span>🐾</span>
        </div>

        <!-- small about line: four 200px pictures with info -->
        <div class="copyright">
            ✨ four wonderful characters · each with a magical personality ✨
        </div>
    </div>
</body>
</html>
